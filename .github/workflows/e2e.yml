run-name: Cross Repo E2E - ${{ github.event.client_payload.source_repository }} @ ${{ github.event.client_payload.sha }} (source run ${{ github.event.client_payload.source_run_id }})
name: Cross Repo E2E

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-cross-e2e]

permissions:
  contents: read

jobs:
  e2e:
    name: End-to-end (frontend + backend)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout TestingFramework
        uses: actions/checkout@v4

      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: BrightSwagShop/Brightswagshop-Backend
          ref: ${{ github.event.client_payload.source_repository == 'BrightSwagShop/Brightswagshop-Backend' && github.event.client_payload.sha || 'main' }}
          path: backend

      - name: Checkout frontend repo
        uses: actions/checkout@v4
        with:
          repository: BrightSwagShop/Brightswagshop-Frontend
          ref: ${{ github.event.client_payload.source_repository == 'BrightSwagShop/Brightswagshop-Frontend' && github.event.client_payload.sha || github.event.client_payload.frontend_ref || 'frontend-framework-integration' }}
          path: frontend

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.x

      - name: Install TestingFramework dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend/frontend
        run: npm install --no-audit --no-fund

      - name: Restore backend dependencies
        working-directory: backend
        run: dotnet restore Backend_BrightSwagShop.sln

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start backend API
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://127.0.0.1:5076
          Mongo__ConnectionString: mongodb://127.0.0.1:27017
          Mongo__Database: BrightSwagShop
          Supabase__Url: ${{ secrets.SUPABASE_URL }}
          Supabase__AnonKey: ${{ secrets.SUPABASE_ANON_KEY }}
          Supabase__ServiceRoleKey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          Stripe__SecretKey: ${{ secrets.STRIPE_SECRET_KEY }}
          Stripe__WebhookSecret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          Jwt__Key: ${{ secrets.JWT_KEY }}
          Jwt__Issuer: ${{ secrets.JWT_ISSUER }}
          Jwt__Audience: ${{ secrets.JWT_AUDIENCE }}
          AzureAd__TenantId: ${{ secrets.AZURE_AD_TENANT_ID }}
          AzureAd__ClientId: ${{ secrets.AZURE_AD_CLIENT_ID }}
          AzureAd__Audience: ${{ secrets.AZURE_AD_AUDIENCE }}
        run: |
          dotnet run --project backend/FakeWebShop.Api/FakeWebShop.Api.csproj --launch-profile http > backend.log 2>&1 &

      - name: Start frontend dev server
        env:
          VITE_API_URL: http://127.0.0.1:5076
        run: |
          cd frontend/frontend
          npm run dev -- --host localhost --port 5173 > ../../frontend.log 2>&1 &

      - name: Wait for backend and frontend (HTTP GET)
        run: |
          set -euo pipefail
          start=$(date +%s)
          timeout=120

          check() {
            url="$1"
            status=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "$url" || echo "000")
            echo "$(date -u +%T) check $url -> $status"
            [ "$status" = "200" ]
          }

          echo "Waiting for frontend (http://localhost:5173/)"
          until check http://localhost:5173; do
            sleep 1
            if [ $(( $(date +%s) - start )) -gt $timeout ]; then
              echo "Frontend did not respond in time"
              break
            fi
          done

          echo "Waiting for backend (http://127.0.0.1:5076/api/categories)"
          until check http://127.0.0.1:5076/api/categories; do
            sleep 1
            if [ $(( $(date +%s) - start )) -gt $timeout ]; then
              echo "Backend did not respond in time"
              break
            fi
          done

          if ! check http://localhost:5173 || ! check http://127.0.0.1:5076/api/categories; then
            echo "Services failed to become healthy; dumping logs"
            echo "----- backend.log -----"
            sed -n '1,400p' backend.log || true
            echo "----- frontend.log -----"
            sed -n '1,400p' frontend.log || true
            exit 1
          fi

      - name: Run cross-repo E2E
        env:
          CI: true
          API_BASE_URL: http://127.0.0.1:5076
          FRONTEND_URL: http://localhost:5173
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_PROJECT_NAME: BrightSwagShop - JIRA
          BROWSERSTACK_BUILD_NAME: Build #${{ github.run_number }}
        run: npm run e2e

      - name: Upload E2E Results to BrowserStack
        if: always()
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_PROJECT_NAME: BrightSwagShop - JIRA
          BROWSERSTACK_BUILD_NAME: Build #${{ github.run_number }}
        continue-on-error: true
        run: npm run upload:browserstack

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-repo-playwright-report
          path: playwright-report
          retention-days: 30

      - name: Upload service logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-repo-service-logs
          path: |
            backend.log
            frontend.log
          retention-days: 30

      - name: Publish success status back to source repo
        env:
          CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}
        if: success() && github.event_name == 'repository_dispatch' && env.CROSS_REPO_PAT != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.CROSS_REPO_PAT }}
          script: |
            const [owner, repo] = '${{ github.event.client_payload.source_repository }}'.split('/');
            const sha = '${{ github.event.client_payload.sha }}';
            const contextName = '${{ github.event.client_payload.status_context }}';
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha,
              state: 'success',
              context: contextName,
              description: 'Cross-repo E2E passed',
              target_url: runUrl,
            });

      - name: Publish failure status back to source repo
        env:
          CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}
        if: failure() && github.event_name == 'repository_dispatch' && env.CROSS_REPO_PAT != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.CROSS_REPO_PAT }}
          script: |
            const [owner, repo] = '${{ github.event.client_payload.source_repository }}'.split('/');
            const sha = '${{ github.event.client_payload.sha }}';
            const contextName = '${{ github.event.client_payload.status_context }}';
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha,
              state: 'failure',
              context: contextName,
              description: 'Cross-repo E2E failed',
              target_url: runUrl,
            });
